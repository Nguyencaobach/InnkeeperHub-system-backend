server {
    listen 80;
    server_name localhost;

    # 1. XỬ LÝ ẢNH (Phục vụ file tĩnh cực nhanh)
    # Khách gọi /uploads/... thì Nginx tự động vào thư mục lấy ảnh trả về
    location /uploads/ {
        alias /var/www/hotel_management_system/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. XỬ LÝ API (Đẩy về cho Node.js)
    # Khách gọi /api/... thì Nginx chuyển tiếp cho Node.js đang chạy ở cổng 3000
    location /api/ {
        # Dùng host.docker.internal để Nginx chui ra ngoài tìm Node.js trên máy bạn
        proxy_pass http://host.docker.internal:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}