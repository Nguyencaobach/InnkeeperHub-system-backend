server {
    listen 80;
    server_name localhost;

    # 1. XỬ LÝ ẢNH (Phục vụ file tĩnh cực nhanh)
    # Khách gọi /uploads/... thì Nginx tự động vào thư mục lấy ảnh trả về
    location /uploads/ {
        alias /var/www/hotel_management_system/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. XỬ LÝ API (Đẩy về cho Node.js)
    # Khách gọi /api/... thì Nginx chuyển tiếp cho Node.js đang chạy ở cổng 3000
    location /api/ {
        # Dùng host.docker.internal để Nginx chui ra ngoài tìm Node.js trên máy bạn
        proxy_pass http://host.docker.internal:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. FALLBACK — Trả trang HTML để ngrok browser warning hoạt động
    # (User từ NgrokGate mở tab này → ngrok hiện "Visit Site" → click xong là xong)
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>InnkeeperHub – Xác nhận kết nối</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;color:#f1f5f9}div{text-align:center;padding:2rem}h1{font-size:1.5rem;margin-bottom:.5rem;color:#38bdf8}p{color:#94a3b8;font-size:.9rem}</style></head><body><div><h1>✅ InnkeeperHub Backend</h1><p>Kết nối thành công. Bạn có thể đóng tab này.</p></div></body></html>';
    }
}